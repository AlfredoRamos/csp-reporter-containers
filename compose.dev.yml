name: csp-reporter
services:
  api:
    build:
      context: backend
      dockerfile: Containerfile
    image: alfredoramos/csp-reporter-backend:latest-alpine
    restart: unless-stopped
    expose:
      - 3000
    depends_on:
      - postgresql
      - valkey
    healthcheck:
      test: ['CMD-SHELL', "curl --fail 'http://${APP_ADDRESS}/api/health'"]
      interval: 1m
      timeout: 30s
      retries: 3
      start_period: 1m30s
    networks:
      - backend-dev
      - database-dev
      - cache-dev

  nginx:
    build:
      context: frontend
      dockerfile: Containerfile
    image: alfredoramos/csp-reporter-frontend:latest-alpine
    restart: unless-stopped
    secrets:
      - server_crt-dev
      - server_key-dev
    cap_add:
      - NET_BIND_SERVICE
    ports:
      - 8080:80
      - 8443:443
    expose:
      - 8080
    depends_on:
      - api
    healthcheck:
      test: ['CMD-SHELL', 'curl --fail http://nginx:8080/health']
      interval: 1m
      timeout: 30s
      retries: 3
      start_period: 1m30s
    networks:
      - backend-dev
      - frontend-dev
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/dhparam.pem:/etc/nginx/dhparam.pem:ro
      - ./docker/nginx/default.dev.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/health.conf:/etc/nginx/conf.d/health.conf:ro
      - ./docker/nginx/ssl.conf:/etc/nginx/conf.d/ssl.conf:ro
      - ./docker/nginx/security.conf:/etc/nginx/conf.d/security.conf:ro
      - ./docker/nginx/cloudflare.conf:/etc/nginx/conf.d/cloudflare.conf:ro
      - ./docker/nginx/gzip.conf:/etc/nginx/conf.d/gzip.conf:ro
      - ./tls/server.crt:/srv/ssl/server.crt:ro
      - ./tls/server.key:/srv/ssl/server.key:ro

  postgresql:
    image: postgres:17-alpine
    restart: unless-stopped
    secrets:
      - db_pass-dev
      - server_crt-dev
      - server_key-dev
    environment:
      POSTGRES_DB: '${DB_NAME}'
      POSTGRES_USER: '${DB_USER}'
      POSTGRES_PASSWORD_FILE: /run/secrets/db_pass-dev
      POSTGRES_INITDB_ARGS: --auth-host=scram-sha-256 --auth-local=scram-sha-256
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
    ports:
      - 5432:5432
    healthcheck:
      test:
        [
          'CMD-SHELL',
          "pg_isready -U '${DB_USER}' -h '${DB_HOST}' -d '${DB_NAME}'",
        ]
      interval: 1m
      timeout: 30s
      retries: 3
      start_period: 1m30s
    networks:
      - database-dev
    volumes:
      - pgsqldata-dev:/var/lib/postgresql/data
      - ./postgresql/init-tls.sh:/docker-entrypoint-initdb.d/init-tls.sh:ro

  valkey:
    image: valkey/valkey:8-alpine
    restart: unless-stopped
    secrets:
      - cache_pass-dev
    command:
      [
        'sh',
        '-c',
        'docker-entrypoint.sh --requirepass $$(cat /run/secrets/cache_pass-dev)',
      ]
    # healthcheck:
    #   test:
    #     [
    #       'CMD-SHELL',
    #       "echo 'auth ${CACHE_PASS}\nping' | valkey-cli -h '${CACHE_HOST}' | grep 'PONG'",
    #     ]
    #   interval: 1m
    #   timeout: 30s
    #   retries: 3
    #   start_period: 1m30s
    networks:
      - cache-dev
    volumes:
      - vkdbdata-dev:/data

networks:
  backend-dev: {}
  frontend-dev: {}
  database-dev: {}
  cache-dev: {}

volumes:
  pgsqldata-dev: {}
  vkdbdata-dev: {}

secrets:
  app_key-dev:
    file: ./secrets/app_key-dev
  db_pass-dev:
    file: ./secrets/db_pass-dev
  cache_pass-dev:
    file: ./secrets/cache_pass-dev
  cookie_secret_key-dev:
    file: ./secrets/cookie_secret_key-dev
  aws_access_key_id-dev:
    file: ./secrets/aws_access_key_id-dev
  aws_secret_access_key-dev:
    file: ./secrets/aws_secret_access_key
  hcaptcha_site_key-dev:
    file: ./secrets/hcaptcha_site_key-dev
  hcaptcha_secret_key-dev:
    file: ./secrets/hcaptcha_secret_key-dev
  email_username-dev:
    file: ./secrets/email_username
  email_password-dev:
    file: ./secrets/email_password-dev
  sentry_dsn-dev:
    file: ./secrets/sentry_dsn-dev
  server_crt-dev:
    file: ./tls/server.crt
  server_key-dev:
    file: ./tls/server.key
