services:
  csp-reporter:
    build:
      context: backend
      dockerfile: Dockerfile
    image: alfredoramos/csp-reporter-backend:latest-alpine
    restart: unless-stopped
    expose:
      - 3000
    depends_on:
      - postgresql
      - valkey
    healthcheck:
      test: ['CMD-SHELL', "curl --fail 'http://${APP_ADDRESS}/api/health'"]
      interval: 1m
      timeout: 30s
      retries: 3
      start_period: 1m30s
    networks:
      - backend
      - database
      - cache
    volumes:
      - ./backend/internal/keys/signing-private.json:/srv/http/backend/internal/keys/signing-private.json:ro
      - ./backend/internal/keys/signing-public.json:/srv/http/backend/internal/keys/signing-public.json:ro
      - ./backend/internal/keys/encryption-private.json:/srv/http/backend/internal/keys/encryption-private.json:ro
      - ./backend/internal/keys/encryption-public.json:/srv/http/backend/internal/keys/encryption-public.json:ro
      - ./backend/internal/keys/dkim.key:/srv/http/backend/internal/keys/dkim.key:ro
      - ./backend/internal/keys/dkim.pub:/srv/http/backend/internal/keys/dkim.pub:ro
    secrets:
      - app_key
      - db_pass
      - cache_pass
      - cookie_secret_key
      - aws_access_key_id
      - aws_secret_access_key
      - hcaptcha_site_key
      - hcaptcha_secret_key
      - email_password
      - sentry_dsn

  nginx:
    build:
      secrets:
        - hcaptcha_site_key
      context: frontend
      dockerfile: Dockerfile
      args:
        - VITE_APP_TITLE
        - VITE_APP_DESC
        - VITE_APP_DOMAIN
        - VITE_API_HOST
        - VITE_ENABLE_USER_REGISTER
        - VITE_LOCALE
        - VITE_TIMEZONE
        - VITE_HCAPTCHA_SIZE
        - VITE_MIN_PASSWORD_LENGTH
        - VITE_GOOGLE_ANALYTICS
        - VITE_COMPANY_NAME
        - VITE_COMPANY_URL
        - VITE_FACEBOOK_LOCALE
        - VITE_TWITTER_AUTHOR
        - VITE_WHATSAPP_PHONE
    image: alfredoramos/csp-reporter-frontend:latest-alpine
    restart: unless-stopped
    ports:
      - 80:80
      - 443:443
    expose:
      - 8080
    depends_on:
      - csp-reporter
    healthcheck:
      test: ['CMD-SHELL', 'curl --fail http://nginx:8080/health']
      interval: 1m
      timeout: 30s
      retries: 3
      start_period: 1m30s
    networks:
      - backend
      - frontend
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/dhparam.pem:/etc/nginx/dhparam.pem:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/health.conf:/etc/nginx/conf.d/health.conf:ro
      - ./docker/nginx/ssl.conf:/etc/nginx/conf.d/ssl.conf:ro
      - ./docker/nginx/security.conf:/etc/nginx/conf.d/security.conf:ro
      - ./docker/nginx/cloudflare.conf:/etc/nginx/conf.d/cloudflare.conf:ro
      - ./docker/nginx/gzip.conf:/etc/nginx/conf.d/gzip.conf:ro
      - /etc/letsencrypt/live/mailsentry.top/fullchain.pem:/srv/ssl/server.crt:ro
      - /etc/letsencrypt/live/mailsentry.top/privkey.pem:/srv/ssl/server.key:ro
      # - /srv/ssl/alfredoramos.mx/intermediate.crt:/srv/ssl/intermediate.crt:ro
      - ./backend/internal/keys/signing-public.json:/srv/http/frontend/keys/signing-public.json:ro
      - ./backend/internal/keys/encryption-private.json:/srv/http/frontend/keys/encryption-private.json:ro

  postgresql:
    image: postgres:17-alpine
    user: '70'
    restart: unless-stopped
    environment:
      POSTGRES_DB: '${DB_NAME}'
      POSTGRES_USER: '${DB_USER}'
      POSTGRES_PASSWORD_FILE: /run/secrets/db_pass
      POSTGRES_INITDB_ARGS: --auth-host=scram-sha-256 --auth-local=scram-sha-256
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
    ports:
      - 5432:5432
    command: >
      -c ssl=on
      -c ssl_cert_file=/var/lib/postgresql/server.crt
      -c ssl_key_file=/var/lib/postgresql/server.key
    healthcheck:
      test:
        [
          'CMD-SHELL',
          "pg_isready -U '${DB_USER}' -h '${DB_HOST}' -d '${DB_NAME}'",
        ]
      interval: 1m
      timeout: 30s
      retries: 3
      start_period: 1m30s
    networks:
      - database
    volumes:
      - pgsqldata:/var/lib/postgresql/data
      - /etc/letsencrypt/live/mailsentry.top/fullchain.pem:/var/lib/postgresql/server.crt:ro
      - /etc/letsencrypt/live/mailsentry.top/privkey.pem:/var/lib/postgresql/server.key:ro
    secrets:
      - db_pass

  valkey:
    image: valkey/valkey:8-alpine
    user: 'valkey'
    restart: unless-stopped
    command: >
      --requirepass "${CACHE_PASS}"
    healthcheck:
      test:
        [
          'CMD-SHELL',
          "echo 'auth ${CACHE_PASS}\nping' | valkey-cli -h '${CACHE_HOST}' | grep 'PONG'",
        ]
      interval: 1m
      timeout: 30s
      retries: 3
      start_period: 1m30s
    networks:
      - cache
    volumes:
      - vkdbdata:/data
    secrets:
      - cache_pass

networks:
  backend: {}
  frontend: {}
  database: {}
  cache: {}

volumes:
  pgsqldata: {}
  vkdbdata: {}

secrets:
  app_key:
    environment: APP_KEY
  db_pass:
    environment: DB_PASS
  cache_pass:
    environment: CACHE_PASS
  cookie_secret_key:
    environment: COOKIE_SECRET_KEY
  aws_access_key_id:
    environment: AWS_ACCESS_KEY_ID
  aws_secret_access_key:
    environment: AWS_SECRET_ACCESS_KEY
  hcaptcha_site_key:
    environment: HCAPTCHA_SITE_KEY
  hcaptcha_secret_key:
    environment: HCAPTCHA_SECRET_KEY
  email_password:
    environment: EMAIL_PASSWORD
  sentry_dsn:
    environment: SENTRY_DSN
